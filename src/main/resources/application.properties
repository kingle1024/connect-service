spring.profiles.active=dev
spring.application.name=connect

spring.mvc.servlet.load-on-startup=1
# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
ip2location.api.key=${IP2LOCATION_API_KEY}

# KAKAO
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:8889/api/auth/kakao/callback}
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,profile_image
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# 카카오 로그인 완료 후 토큰을 돌려보낼 수 있는 앱 리다이렉트 URI 화이트리스트 (오픈 리다이렉트 방지)
app.oauth2.allowed-redirect-uris=${APP_OAUTH2_ALLOWED_REDIRECT_URIS:exp://,exps://,connect://,http://localhost,http://127.0.0.1}

# Cloudflare R2 (프로필 이미지 저장). 실제 값은 application-dev.properties 또는 환경변수로 주입.
r2.endpoint=${R2_ENDPOINT:}
r2.access-key=${R2_ACCESS_KEY:}
r2.secret-key=${R2_SECRET_KEY:}
r2.bucket=${R2_BUCKET:}
r2.public-base-url=${R2_PUBLIC_BASE_URL:}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=kingle1024@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT}
spring.redis.password=${REDIS_PASSWORD}
spring.redis.cluster.nodes=${REDIS_CLUSTER_NODES}
spring.redis.cluster.max-redirects=5
spring.data.redis.timeout=5000
# Lettuce Connection Pool 설정 (선택 사항, 기본값 사용 시 생략 가능)
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=-1ms

jwt.secret-key=${JWT_SECRET}
jwt.access-token-expiration-milliseconds=3600000
jwt.refresh-token-expiration-milliseconds=604800000

ranking.key=projectRanking:products
event.key.prefix=product:event:
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
google.gemini.api-key=${GEMINI_API_KEY}
google.gemini.api-url=${GEMINI_API_URL}

spring.kafka.bootstrap-servers=${KAFKA_HOST}
# Producer 설정
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# JobHistoryLog DTO를 JSON으로 보낼 것
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer 설정
spring.kafka.consumer.group-id=job-log-group
# 처음부터 읽거나, 가장 나중부터 읽거나 (earliest/latest)
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# JSON으로 받은 메시지를 JobHistoryLog로 역직렬화
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

